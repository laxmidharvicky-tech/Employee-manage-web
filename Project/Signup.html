<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
</head>

<body>
    <form>
        <h1 class="zero">EMPOLYEE MANAGEMENT APPLICATION</h1>
        <header>
            <nav>
                <h2><a href="./Index Login form.html" target="_blank">Login</a></h2>
            </nav>
            <h2>Sign up</h2>
        </header>
        <main class="second">
            <label id="Name">Enter your name :</label>
            <input type="text" id="Name" name="name" placeholder="Enter your name"><br><br>
            <label id="phone">Enter your phone number :</label>
            <label for="country"></label>
            <select name="country_code" id="country" required>
                <option value="">-- Choose a Country --</option>
                <option value="US">United States (+1)</option>
                <option value="GB">United Kingdom (+44)</option>
                <option value="CA">Canada (+1)</option>
                <option value="IN">India (+91)</option>
                <option value="AU">Australia (+61)</option>
            </select>
            <input type="phone" id="phone" name="phone" placeholder="Enter your Number" maxlength="10"><br><br>
            <label id="email">Enter your Email :</label>
            <input type="email" id="email" name="email" placeholder="Enter your Email"><br><br>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob"><br><br>
            <label id="password">Enter password</label>
            <input type="password" id="password" name="password" placeholder="password" maxlength="8"
                minlength="6"><br><br>
        </main>
        <fotter class="two">
            <button type="submit"> Signup</button>
            <h5 class="contact"><a href="./forgot password.html" target="_blank">Forgot Password</a></h5>
        </fotter>
    </form>
    <p>All rights reserved &#xA9; 2026 CodingArch Technology.</p>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <form>
        <h1>EMPOLYEE MANAGEMENT APPLICATION</h1><br>
        <header>
            <h2>Forgot password</h2>
        </header>
        <main>
            <table class="jjhf">
                <tr>
                    <td>
                        <label id="contact">Enter your Email or Mobile</label>
                        <input type="text" id="contact" name="contact" placeholder="Enter Email or Mobile">
                    </td>
                </tr>
                <br><br>
                <tr>
                    <td>
                        <label id="password">Enter New Password</label>
                        <input type="Password" id="password" name="password" placeholder="Enter new password"
                            maxlength="8" minlength="6">
                    </td>
                </tr>
                <br><br>
                <tr>
                    <td>
                        <label id="password">Enter Confirm Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter confirm password"
                            maxlength="8" minlength="6">
                    </td>
                </tr>
            </table>
            <br><br>
        </main>
        <footer class="cat">
            <button type="submit">Reset password</button>

        </footer>
        <pre><h3><a href="./Index Login form.html" target="_blank">Login</a>        <a href="./Signup.html" target="_blank">Signup</a></h3></pre>
    </form>
    <div class="aac">
        <p>All rights reserved &#xA9; 2026 CodingArch Technology.</p>
    </div>
</body>

</html>

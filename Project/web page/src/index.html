<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete pop-up</title>
    <link href="./output.css" rel="stylesheet">
</head>

<body>
    <section class="flex justify-center items-center mt-64 font-serif">
        <div class="bg-amber-50 w-32 md:w-md h-60 flex justify-center items-center shadow-2xl ">
            <div class="w-32 md:w-md">
                <h2 class="font-bold text-xl text-center p-3">Are you sure want to delete ?</h2>
                <div class="m-5 flex justify-around pr-14">
                    <span class=" relative -top-30 -right-80">
                        <button class="">&times;</button>
                    </span>

                    <button class="bg-red-600 text-white w-20 hover:bg-black">Cancel</button>
                    <button class="bg-green-700 text-white w-20 hover:bg-black">Delete</button>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
